version: "3.8"

services:
  n8n:
    image: n8nio/n8n:1.50.2
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - WEBHOOK_URL=https://0fac-2402-800-639f-bdc7-81c5-56f3-e26-765b.ngrok-free.app    
    restart: unless-stopped

volumes:
  n8n_data: